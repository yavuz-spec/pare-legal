<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pare — Legal Documents</title>
  <meta name="description" content="Legal documents for Pare, your personal AI cooking assistant by Appcern.">
  <style>
    :root {
      --bg: #FFFBF7;
      --surface: #FFFFFF;
      --text: #1a1a1a;
      --text-muted: #666666;
      --text-subtle: #999999;
      --border: rgba(0,0,0,0.08);
      --border-strong: rgba(0,0,0,0.12);
      --accent: #FF6B35;
      --accent-soft: #FFE8DD;
      --accent-dark: #993C1D;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1410;
        --surface: #241c17;
        --text: #f5f1ea;
        --text-muted: #a8a098;
        --text-subtle: #6e665e;
        --border: rgba(255,255,255,0.08);
        --border-strong: rgba(255,255,255,0.14);
        --accent: #FF8556;
        --accent-soft: #3a2418;
        --accent-dark: #FFB593;
      }
    }

    * { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 0;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .container {
      max-width: 560px;
      margin: 0 auto;
      padding: 64px 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 64px;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      border-radius: 9px;
      background: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      font-weight: 600;
      font-size: 20px;
      font-family: Georgia, "Times New Roman", serif;
      font-style: italic;
      letter-spacing: -0.5px;
    }

    .brand-text { line-height: 1.2; }
    .brand-name { font-size: 15px; font-weight: 500; color: var(--text); }
    .brand-by { font-size: 12px; color: var(--text-subtle); margin-top: 2px; }

    h1 {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 38px;
      font-weight: 500;
      margin: 0 0 12px;
      letter-spacing: -0.8px;
      line-height: 1.1;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 17px;
      margin: 0 0 48px;
      line-height: 1.5;
    }

    .doc-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 56px;
    }

    .doc-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 26px;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 14px;
      text-decoration: none;
      color: var(--text);
      transition: all 0.2s ease;
    }

    .doc-link:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(255, 107, 53, 0.08);
    }

    .doc-link-text { flex: 1; }
    .doc-link-title { font-size: 16px; font-weight: 500; margin-bottom: 4px; }
    .doc-link-desc { font-size: 13px; color: var(--text-muted); }

    .doc-link-arrow {
      color: var(--accent);
      font-size: 20px;
      transition: transform 0.2s ease;
      flex-shrink: 0;
      margin-left: 16px;
    }

    .doc-link:hover .doc-link-arrow { transform: translateX(4px); }

    footer {
      padding-top: 28px;
      border-top: 0.5px solid var(--border);
      color: var(--text-subtle);
      font-size: 13px;
      line-height: 1.7;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }

    footer a:hover { text-decoration: underline; }

    @media (max-width: 520px) {
      .container { padding: 48px 20px; }
      h1 { font-size: 30px; }
      .subtitle { font-size: 16px; margin-bottom: 36px; }
      .doc-link { padding: 18px 20px; }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="brand">
      <div class="brand-mark">P</div>
      <div class="brand-text">
        <div class="brand-name">Pare</div>
        <div class="brand-by">by Appcern</div>
      </div>
    </div>

    <h1>Legal Documents</h1>
    <p class="subtitle">Our policies and terms, written in plain language.</p>

    <div class="doc-list">
      <a class="doc-link" href="./terms/">
        <div class="doc-link-text">
          <div class="doc-link-title">Terms of Service</div>
          <div class="doc-link-desc">How you can use Pare</div>
        </div>
        <div class="doc-link-arrow">→</div>
      </a>

      <a class="doc-link" href="./privacy/">
        <div class="doc-link-text">
          <div class="doc-link-title">Privacy Policy</div>
          <div class="doc-link-desc">How we handle your data</div>
        </div>
        <div class="doc-link-arrow">→</div>
      </a>
    </div>

    <footer>
      © 2026 Appcern. All rights reserved.<br>
      Contact: <a href="mailto:support@appcern.com">support@appcern.com</a>
    </footer>

  </div>
</body>
</html>
